<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-graduation-cap"></i> Student Management System</h1>
            <p class="subtitle">Manage student records efficiently</p>
        </header>

        <div class="main-content">
            <!-- Form Section -->
            <div class="form-section">
                <h2><i class="fas fa-user-plus"></i> Add New Student</h2>
                <form id="studentForm">
                    <div class="form-group">
                        <label for="studentName">Full Name</label>
                        <input type="text" id="studentName" placeholder="Enter student name" required>
                    </div>
                    <div class="form-group">
                        <label for="studentEmail">Email</label>
                        <input type="email" id="studentEmail" placeholder="Enter email address" required>
                    </div>
                    <div class="form-group">
                        <label for="studentPhone">Phone</label>
                        <input type="tel" id="studentPhone" placeholder="Enter phone number" required>
                    </div>
                    <div class="form-group">
                        <label for="studentCourse">Course</label>
                        <select id="studentCourse" required>
                            <option value="">Select Course</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Business">Business Administration</option>
                            <option value="Arts">Arts & Design</option>
                            <option value="Science">Science</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="studentYear">Year</label>
                        <select id="studentYear" required>
                            <option value="">Select Year</option>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                            <option value="4th Year">4th Year</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="studentGPA">GPA</label>
                        <input type="number" id="studentGPA" placeholder="Enter GPA (0-10)" step="0.01" min="0" max="10" required>
                    </div>
                    <button type="submit" class="btn btn-add"><i class="fas fa-plus"></i> Add Student</button>
                </form>
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <div class="stat-info">
                        <h3 id="totalStudents">0</h3>
                        <p>Total Students</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-star"></i>
                    <div class="stat-info">
                        <h3 id="topPerformers">0</h3>
                        <p>Top Performers</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-chart-line"></i>
                    <div class="stat-info">
                        <h3 id="avgGPA">0.00</h3>
                        <p>Average GPA</p>
                    </div>
                </div>
            </div>

            <!-- Search Section -->
            <div class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search students by name, email, or course...">
                </div>
            </div>

            <!-- Table Section -->
            <div class="table-section">
                <h2><i class="fas fa-list"></i> Student Records</h2>
                <div class="table-container">
                    <table id="studentTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Course</th>
                                <th>Year</th>
                                <th>GPA</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                            <!-- Student data will be inserted here -->
                        </tbody>
                    </table>
                </div>
                <div id="noDataMessage" class="no-data">
                    <i class="fas fa-folder-open"></i>
                    <p>No student records found</p>
                </div>
            </div>
        </div>

        <!-- Edit Modal -->
        <div id="editModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2><i class="fas fa-edit"></i> Edit Student</h2>
                <form id="editForm">
                    <input type="hidden" id="editStudentId">
                    <div class="form-group">
                        <label for="editName">Full Name</label>
                        <input type="text" id="editName" required>
                    </div>
                    <div class="form-group">
                        <label for="editEmail">Email</label>
                        <input type="email" id="editEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="editPhone">Phone</label>
                        <input type="tel" id="editPhone" required>
                    </div>
                    <div class="form-group">
                        <label for="editCourse">Course</label>
                        <select id="editCourse" required>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Business">Business Administration</option>
                            <option value="Arts">Arts & Design</option>
                            <option value="Science">Science</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editYear">Year</label>
                        <select id="editYear" required>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                            <option value="4th Year">4th Year</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editGPA">GPA</label>
                        <input type="number" id="editGPA" step="0.01" min="0" max="4" required>
                    </div>
                    <button type="submit" class="btn btn-update"><i class="fas fa-save"></i> Update Student</button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
